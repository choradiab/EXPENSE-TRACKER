<!DOCTYPE html>

<html>
<head>
  <title>Finance Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      background: #f5f5f5;
    }

```
h2 {
  text-align: center;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  background: black;
  color: white;
  border: none;
  font-weight: bold;
}
```

  </style>
</head>

<body>

  <h2>💰 Finance Tracker</h2>

  <form id="form">

```
<label>Date</label>
<input id="date" type="date">

<label>Type</label>
<select id="type">
  <option>Income</option>
  <option>Expense</option>
</select>

<label>Household / Office</label>
<select id="categoryType">
  <option>Household</option>
  <option>Office</option>
</select>

<label>Category</label>
<select id="category"></select>

<label>Account</label>
<select id="account">
  <option>Cash</option>
  <option>Savings</option>
  <option>Credit Card</option>
</select>

<label>Amount</label>
<input id="amount" type="number" required>

<label>Notes</label>
<input id="notes">

<button type="submit">Save</button>
```

  </form>

  <script>

    // 🔥 PUT YOUR SCRIPT URL HERE
    const scriptURL = "https://script.google.com/macros/s/AKfycbxqDUNC8ZJrFs4g6DR9KMR3W0Cid-VQKxfx0fFiAnCv9_KNDK7lV6pa4BR-DiQ3NOujxQ/exec";

    const categories = {
      Household: [
        "Grocery","Fruits & Vegetables","Rent","Utilities",
        "Internet & Mobile","Transport","Medical",
        "Entertainment","Dining Out","Education","Misc"
      ],
      Office: [
        "Office Rent","Salaries","Software","Equipment",
        "Travel","Marketing","Utilities","Education","Misc"
      ]
    };

    const categorySelect = document.getElementById("category");
    const categoryTypeSelect = document.getElementById("categoryType");

    function loadCategories() {
      const type = categoryTypeSelect.value;
      categorySelect.innerHTML = "";
      categories[type].forEach(cat => {
        const option = document.createElement("option");
        option.text = cat;
        categorySelect.add(option);
      });
    }

    categoryTypeSelect.addEventListener("change", loadCategories);
    loadCategories();

    // Default today's date
    document.getElementById("date").valueAsDate = new Date();

    document.getElementById("form").addEventListener("submit", e => {
      e.preventDefault();

      const data = {
        date: document.getElementById("date").value,
        type: document.getElementById("type").value,
        categoryType: categoryTypeSelect.value,
        category: categorySelect.value,
        account: document.getElementById("account").value,
        amount: document.getElementById("amount").value,
        notes: document.getElementById("notes").value
      };

      fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      })
      .then(() => {
        alert("Saved!");
        document.getElementById("form").reset();
        document.getElementById("date").valueAsDate = new Date();
        loadCategories();
      })
      .catch(() => alert("Error"));
    });

  </script>

</body>
</html>
